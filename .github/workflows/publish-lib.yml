name: Publish @khelahobe/kui

on:
  push:
    branches: [main]
    paths:
      - 'packages/lib/**'
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - run: pnpm install --frozen-lockfile

      - run: pnpm build
        working-directory: packages/lib

      - name: Diagnose npm auth
        run: |
          echo "::group::npm whoami"
          npm whoami || echo "(whoami failed)"
          echo "::endgroup::"
          echo "::group::npm config (sanitized)"
          npm config list | grep -v '_authToken' || true
          echo "::endgroup::"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_ACCESS_TOKEN }}

      - run: npm publish --access public
        working-directory: packages/lib
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_ACCESS_TOKEN }}
